<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UI.lua Documentation · dxzlol/67</title>

    <style>
        /* ============================================================
                   RESET & BASE
                   ============================================================ */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #1c2333;
            --bg-card-hover: #252d3f;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --text-muted: #484f58;

            --matcha-dark: #2d5a27;
            --matcha: #4caf50;
            --matcha-light: #81c784;
            --matcha-glow: rgba(76, 175, 80, 0.15);

            --pink: #f48fb1;
            --pink-dark: #f06292;
            --pink-glow: rgba(244, 143, 177, 0.15);

            --border-color: #30363d;
            --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --radius: 12px;
            --radius-sm: 6px;
            --transition: 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            padding: 80px 0 40px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ============================================================
                   NAV
                   ============================================================ */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            padding: 16px 0;
            background: rgba(13, 17, 23, 0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-color);
        }
        .navbar .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: var(--font-mono);
            font-weight: 600;
            font-size: 1.1rem;
            text-decoration: none;
            color: var(--text-primary);
        }
        .nav-logo .logo-bracket {
            color: var(--pink);
        }
        .nav-logo .logo-name {
            color: var(--text-primary);
        }
        .nav-logo .logo-repo {
            color: var(--matcha);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 28px;
            list-style: none;
        }
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: var(--transition);
            position: relative;
        }
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--pink);
            transition: var(--transition);
        }
        .nav-links a:hover {
            color: var(--text-primary);
        }
        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-gh-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            border-radius: var(--radius-sm);
            background: var(--pink);
            color: #0d1117 !important;
            font-weight: 600 !important;
            font-size: 0.85rem !important;
            transition: var(--transition);
            text-decoration: none;
        }
        .nav-gh-btn:hover {
            transform: scale(1.04);
            box-shadow: 0 0 24px var(--pink-glow);
        }

        .nav-hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px;
        }
        .nav-hamburger span {
            display: block;
            width: 24px;
            height: 2px;
            background: var(--text-secondary);
            border-radius: 2px;
            transition: var(--transition);
        }
        .nav-hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }
        .nav-hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .nav-hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        /* ============================================================
                   DOCS HEADER
                   ============================================================ */
        .docs-header {
            margin-bottom: 32px;
        }
        .docs-header .section-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--pink);
            background: rgba(244, 143, 177, 0.08);
            padding: 4px 14px;
            border-radius: 20px;
            border: 1px solid rgba(244, 143, 177, 0.15);
            margin-bottom: 12px;
        }
        .docs-header .section-title {
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.2;
            margin-bottom: 8px;
        }
        .docs-header .section-title .highlight {
            background: linear-gradient(135deg, var(--matcha), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .docs-header .section-sub {
            color: var(--text-secondary);
            font-size: 1.05rem;
            max-width: 560px;
        }

        .docs-stats {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        /* ============================================================
                   SEARCH
                   ============================================================ */
        .docs-search-wrapper {
            position: relative;
            max-width: 500px;
            margin-bottom: 32px;
        }
        .docs-search-wrapper input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 0.95rem;
            transition: var(--transition);
            outline: none;
        }
        .docs-search-wrapper input:focus {
            border-color: var(--pink);
            box-shadow: 0 0 0 3px var(--pink-glow);
        }
        .docs-search-wrapper input::placeholder {
            color: var(--text-muted);
        }
        .docs-search-wrapper .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            font-size: 1.1rem;
        }
        .docs-search-wrapper .shortcut-hint {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.65rem;
            color: var(--text-muted);
            background: var(--bg-card);
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            font-family: var(--font-mono);
            pointer-events: none;
        }

        /* ============================================================
                   DOCS GRID
                   ============================================================ */
        .docs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }

        .doc-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 20px 24px;
            transition: var(--transition);
            position: relative;
        }
        .doc-card:hover {
            border-color: rgba(244, 143, 177, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .doc-card .doc-name {
            font-family: var(--font-mono);
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--pink);
            margin-bottom: 2px;
        }
        .doc-card .doc-signature {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--matcha-light);
            margin-bottom: 8px;
        }
        .doc-card .doc-desc {
            color: var(--text-secondary);
            font-size: 0.92rem;
            line-height: 1.6;
            margin-bottom: 12px;
        }
        .doc-card .doc-category {
            display: inline-block;
            font-size: 0.65rem;
            font-family: var(--font-mono);
            padding: 2px 12px;
            border-radius: 12px;
            background: rgba(76, 175, 80, 0.1);
            color: var(--matcha-light);
            border: 1px solid rgba(76, 175, 80, 0.15);
            margin-bottom: 12px;
        }
        .doc-card .doc-details {
            font-size: 0.85rem;
            color: var(--text-secondary);
            border-top: 1px solid var(--border-color);
            padding-top: 12px;
            margin-top: 4px;
        }
        .doc-card .doc-details .detail-row {
            display: flex;
            gap: 8px;
            margin-bottom: 4px;
        }
        .doc-card .doc-details .detail-row .label {
            color: var(--text-muted);
            min-width: 70px;
            flex-shrink: 0;
            font-family: var(--font-mono);
            font-size: 0.75rem;
        }
        .doc-card .doc-details .detail-row .value {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }
        .doc-card .doc-example {
            margin-top: 12px;
            background: var(--bg-primary);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 80px;
            overflow-y: auto;
            transition: max-height 0.3s ease;
        }
        .doc-card .doc-example.expanded {
            max-height: 300px;
        }
        .doc-card .doc-example-toggle {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.7rem;
            cursor: pointer;
            font-family: var(--font-mono);
            padding: 4px 0;
            transition: var(--transition);
        }
        .doc-card .doc-example-toggle:hover {
            color: var(--pink);
        }

        .doc-card.hidden {
            display: none;
        }

        .no-docs-found {
            grid-column: 1/-1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .no-docs-found .big-emoji {
            font-size: 3rem;
            display: block;
            margin-bottom: 12px;
        }

        /* ============================================================
                   SECRET DOCS (Easter egg)
                   ============================================================ */
        .doc-card.secret {
            border-color: var(--pink);
        }
        .doc-card.secret .doc-name {
            color: var(--pink-dark);
        }
        .doc-card.secret .doc-category {
            background: rgba(244, 143, 177, 0.15);
            color: var(--pink-dark);
            border-color: rgba(244, 143, 177, 0.2);
        }

        /* ============================================================
                   FOOTER
                   ============================================================ */
        .footer {
            margin-top: 60px;
            padding: 40px 0 32px;
            border-top: 1px solid var(--border-color);
        }
        .footer .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .footer .copy {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .footer .copy a {
            color: var(--pink);
            text-decoration: none;
        }
        .footer .copy a:hover {
            color: var(--matcha);
        }
        .footer .socials {
            display: flex;
            gap: 18px;
        }
        .footer .socials a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition);
        }
        .footer .socials a:hover {
            color: var(--pink);
        }

        /* ============================================================
                   TOAST
                   ============================================================ */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--bg-card);
            border: 1px solid var(--matcha);
            color: var(--text-primary);
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            z-index: 999;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        /* ============================================================
                   RESPONSIVE
                   ============================================================ */
        @media (max-width: 768px) {
            .nav-links {
                position: fixed;
                top: 0;
                right: -100%;
                width: 280px;
                height: 100vh;
                background: var(--bg-secondary);
                flex-direction: column;
                padding: 80px 32px 32px;
                gap: 20px;
                border-left: 1px solid var(--border-color);
                transition: var(--transition);
                align-items: flex-start;
            }
            .nav-links.open {
                right: 0;
            }
            .nav-hamburger {
                display: flex;
                z-index: 101;
            }

            .docs-grid {
                grid-template-columns: 1fr;
            }
            .docs-search-wrapper {
                max-width: 100%;
            }
            .docs-search-wrapper .shortcut-hint {
                display: none;
            }
            .footer .container {
                flex-direction: column;
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            .doc-card {
                padding: 18px 16px;
            }
            .docs-search-wrapper input {
                font-size: 0.85rem;
                padding: 8px 12px 8px 36px;
            }
        }
    </style>
</head>

            // ============================================================
            // SECRET DOCS (Easter egg)
            // ============================================================

            const SECRET_DOCS = [{

            }, {

                params: [
                    { name: 'bread', type: 'string', description: 'Type of bread (white, whole wheat, sourdough, etc.).' },
                    { name: 'filling', type: 'table', description: 'Array of ingredients (cheese, meat, veggies, etc.).' }
                ],

                example: 'sandwich.make("sourdough", {"cheese", "ham", "lettuce"})'
            }, {

            }, {

                signature: 'happiness.get()',
                description: 'It\'s not money. It\'s not fame. It\'s... actually, it\'s a clean codebase. A clean codebase is the secret to happiness.',

                params: [],

                example: 'while true do cleanCodebase() end'
            }, {
                name: 'How to become a wizard',
                signature: 'wizard.become()',
                description: 'Step 1: Write a Lua script. Step 2: It works on the first try. Step 3: You are now a wizard. Congratulations!',
                category: '🧙‍♂️ Arcane',

            // ============================================================
            // DOM REFS
            // ============================================================

            const docsGrid = document.getElementById('docsGrid');
            const docsSearch = document.getElementById('docsSearch');
            const docCount = document.getElementById('docCount');
            const toast = document.getElementById('toast');
            const hamburger = document.getElementById('hamburger');
            const navLinks = document.getElementById('navLinks');

            let toastTimeout = null;
            let secretDocsActive = false;

            // ============================================================
            // TOAST
            // ============================================================

            function showToast(message) {
                toast.textContent = message;
                toast.classList.add('show');
                if (toastTimeout) clearTimeout(toastTimeout);
                toastTimeout = setTimeout(() => {
                    toast.classList.remove('show');
                }, 3000);
            }


            // ============================================================
            // RENDER DOCS
            // ============================================================

            function renderDocs(filter = '') {
                const query = filter.toLowerCase().trim();

                // Secret trigger
                if (query === 'lol') {
                    if (!secretDocsActive) {
                        secretDocsActive = true;
                        showToast('🤣 Secret docs unlocked! Type "lol" again to go back.');
                    } else {
                        secretDocsActive = false;
                        showToast('🔙 Back to normal docs.');
                        docsSearch.value = '';
                        renderDocs('');
                        return;
                    }
                }

                if (secretDocsActive) {
                    renderSecretDocs(query);
                    return;
                }

                let filtered = DOCS_DATA;
                if (query) {
                    filtered = DOCS_DATA.filter(doc =>
                        doc.name.toLowerCase().includes(query) ||
                        doc.description.toLowerCase().includes(query) ||
                        doc.category.toLowerCase().includes(query) ||
                        (doc.signature && doc.signature.toLowerCase().includes(query))
                    );
                }

                docCount.textContent = filtered.length;

                if (filtered.length === 0) {
                    docsGrid.innerHTML = `
                        <div class="no-docs-found">
                            <span class="big-emoji">🔍</span>
                            <h3 style="color:var(--text-primary);margin-bottom:8px;">No matching functions found</h3>
                            <p style="color:var(--text-secondary);">Try a different search term</p>
                        </div>
                    `;
                    return;
                }

                docsGrid.innerHTML = filtered.map((doc) => {
                    let paramsHtml = '';
                    if (doc.params && doc.params.length > 0) {
                        paramsHtml = doc.params.map(p =>
                            `<div class="detail-row">
                                <span class="label">${p.name}</span>
                                <span class="value"><span style="color:var(--matcha-light);">${p.type}</span> — ${p.description}</span>
                            </div>`
                        ).join('');
                    } else {
                        paramsHtml = `<div class="detail-row"><span class="label">Params</span><span class="value">None</span></div>`;
                    }

                    const returnsHtml = doc.returns ?
                        `<div class="detail-row"><span class="label">Returns</span><span class="value">${doc.returns}</span></div>` :
                        '';

                    const exampleId = 'example-' + doc.name.replace(/[^a-zA-Z0-9]/g, '');
                    const exampleHtml = doc.example ?
                        `
                        <button class="doc-example-toggle" onclick="toggleExample('${exampleId}')">📖 Show Example</button>
                        <div class="doc-example" id="${exampleId}" style="max-height:0;padding:0;overflow:hidden;border:none;margin-top:4px;">
                            <code>${escapeHtml(doc.example)}</code>
                        </div>
                    ` : '';

                    return `
                        <div class="doc-card">
                            <div class="doc-name">${escapeHtml(doc.name)}</div>
                            ${doc.signature ? `<div class="doc-signature">${escapeHtml(doc.signature)}</div>` : ''}
                            <div class="doc-category">${escapeHtml(doc.category)}</div>
                            <div class="doc-desc">${escapeHtml(doc.description)}</div>
                            <div class="doc-details">
                                ${paramsHtml}
                                ${returnsHtml}
                            </div>
                            ${exampleHtml}
                        </div>
                    `;
                }).join('');

                window.toggleExample = function(id) {
                    const el = document.getElementById(id);
                    if (!el) return;
                    const isExpanded = el.style.maxHeight !== '0px' && el.style.maxHeight !== '';
                    if (isExpanded) {
                        el.style.maxHeight = '0px';
                        el.style.padding = '0';
                        el.style.border = 'none';
                        el.style.marginTop = '0';
                        const btn = el.parentElement.querySelector('.doc-example-toggle');
                        if (btn) btn.textContent = '📖 Show Example';
                    } else {
                        el.style.maxHeight = '300px';
                        el.style.padding = '10px 14px';
                        el.style.border = '1px solid var(--border-color)';
                        el.style.marginTop = '8px';
                        const btn = el.parentElement.querySelector('.doc-example-toggle');
                        if (btn) btn.textContent = '📕 Hide Example';
                    }
                };
            }


            // ============================================================
            // RENDER SECRET DOCS
            // ============================================================

            function renderSecretDocs(query) {
                let filtered = SECRET_DOCS;
                if (query && query !== 'lol') {
                    filtered = SECRET_DOCS.filter(doc =>
                        doc.name.toLowerCase().includes(query) ||
                        doc.description.toLowerCase().includes(query) ||
                        doc.category.toLowerCase().includes(query)
                    );
                }

                docCount.textContent = filtered.length;

                if (filtered.length === 0) {
                    docsGrid.innerHTML = `
                        <div class="no-docs-found">
                            <span class="big-emoji">🤣</span>
                            <h3 style="color:var(--text-primary);margin-bottom:8px;">No secret docs found</h3>
                            <p style="color:var(--text-secondary);">Try a different search term, or type "lol" to go back</p>
                        </div>
                    `;
                    return;
                }

                docsGrid.innerHTML = filtered.map((doc) => {
                    let paramsHtml = '';
                    if (doc.params && doc.params.length > 0) {
                        paramsHtml = doc.params.map(p =>
                            `<div class="detail-row">
                                <span class="label">${p.name}</span>
                                <span class="value"><span style="color:var(--matcha-light);">${p.type}</span> — ${p.description}</span>
                            </div>`
                        ).join('');
                    } else {
                        paramsHtml = `<div class="detail-row"><span class="label">Params</span><span class="value">None</span></div>`;
                    }

                    const returnsHtml = doc.returns ?
                        `<div class="detail-row"><span class="label">Returns</span><span class="value">${doc.returns}</span></div>` :
                        '';

                    const exampleId = 'secret-example-' + doc.name.replace(/[^a-zA-Z0-9]/g, '');
                    const exampleHtml = doc.example ?
                        `
                        <button class="doc-example-toggle" onclick="toggleExample('${exampleId}')">📖 Show Example</button>
                        <div class="doc-example" id="${exampleId}" style="max-height:0;padding:0;overflow:hidden;border:none;margin-top:4px;">
                            <code>${escapeHtml(doc.example)}</code>
                        </div>
                    ` : '';

                    return `
                        <div class="doc-card secret">
                            <div class="doc-name">${escapeHtml(doc.name)}</div>
                            ${doc.signature ? `<div class="doc-signature">${escapeHtml(doc.signature)}</div>` : ''}
                            <div class="doc-category">${escapeHtml(doc.category)}</div>
                            <div class="doc-desc">${escapeHtml(doc.description)}</div>
                            <div class="doc-details">
                                ${paramsHtml}
                                ${returnsHtml}
                            </div>
                            ${exampleHtml}
                        </div>
                    `;
                }).join('');

                window.toggleExample = function(id) {
                    const el = document.getElementById(id);
                    if (!el) return;
                    const isExpanded = el.style.maxHeight !== '0px' && el.style.maxHeight !== '';
                    if (isExpanded) {
                        el.style.maxHeight = '0px';
                        el.style.padding = '0';
                        el.style.border = 'none';
                        el.style.marginTop = '0';
                        const btn = el.parentElement.querySelector('.doc-example-toggle');
                        if (btn) btn.textContent = '📖 Show Example';
                    } else {
                        el.style.maxHeight = '300px';
                        el.style.padding = '10px 14px';
                        el.style.border = '1px solid var(--border-color)';
                        el.style.marginTop = '8px';
                        const btn = el.parentElement.querySelector('.doc-example-toggle');
                        if (btn) btn.textContent = '📕 Hide Example';
                    }
                };
            }


            // ============================================================
            // UTILITY
            // ============================================================

            function escapeHtml(text) {
                if (!text) return '';
                return text
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
            }


            // ============================================================
            // HAMBURGER
            // ============================================================

            function initHamburger() {
                if (!hamburger || !navLinks) return;
                hamburger.addEventListener('click', () => {
                    const isOpen = navLinks.classList.toggle('open');
                    hamburger.classList.toggle('active');
                    hamburger.setAttribute('aria-expanded', isOpen);
                });

                navLinks.querySelectorAll('a').forEach(link => {
                    link.addEventListener('click', () => {
                        navLinks.classList.remove('open');
                        hamburger.classList.remove('active');
                        hamburger.setAttribute('aria-expanded', 'false');
                    });
                });

                document.addEventListener('click', (e) => {
                    if (!e.target.closest('.navbar') && navLinks.classList.contains('open')) {
                        navLinks.classList.remove('open');
                        hamburger.classList.remove('active');
                        hamburger.setAttribute('aria-expanded', 'false');
                    }
                });
            }


            // ============================================================
            // DOCS SEARCH
            // ============================================================

            function initDocsSearch() {
                let searchTimeout;
                docsSearch.addEventListener('input', () => {
                    clearTimeout(searchTimeout);
                    searchTimeout = setTimeout(() => {
                        renderDocs(docsSearch.value);
                    }, 200);
                });

                document.addEventListener('keydown', (e) => {
                    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                        e.preventDefault();
                        docsSearch.focus();
                        docsSearch.select();
                    }
                    if (e.key === 'Escape' && document.activeElement === docsSearch) {
                        docsSearch.value = '';
                        secretDocsActive = false;
                        renderDocs('');
                        docsSearch.blur();
                        showToast('🔍 Search cleared');
                    }
                });
            }


            // ============================================================
            // ANTI-INSPECT (optional)
            // ============================================================

            function initAntiInspect() {
                document.addEventListener('contextmenu', function(e) {
                    e.preventDefault();
                    showToast('🚫 Nice try, inspector!');
                    return false;
                });

                document.addEventListener('keydown', function(e) {
                    if (e.key === 'F12') {
                        e.preventDefault();
                        showToast('🚫 F12 is disabled, inspector!');
                        return false;
                    }
                    if ((e.ctrlKey || e.metaKey) && (e.shiftKey || e.altKey) && (e.key === 'i' || e.key === 'I')) {
                        e.preventDefault();
                        showToast('🚫 Dev tools are locked, inspector!');
                        return false;
                    }
                    if ((e.ctrlKey || e.metaKey) && (e.key === 'u' || e.key === 'U')) {
                        e.preventDefault();
                        showToast('🚫 Source viewer is disabled!');
                        return false;
                    }
                    if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'j' || e.key === 'J')) {
                        e.preventDefault();
                        showToast('🚫 Console is locked!');
                        return false;
                    }
                    return true;
                });
            }


            // ============================================================
            // INIT
            // ============================================================

            initHamburger();
            initDocsSearch();
            initAntiInspect();
            renderDocs();

            console.log('📖 UI.lua Documentation loaded —', DOCS_DATA.length, 'functions.');
            console.log('🤣 Secret docs: type "lol" in the search bar!');

        })();
    </script>
